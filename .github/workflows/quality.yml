name: Quality

on:
  pull_request:
    branches:
      - main
      - preview
      - 310-companion-app-foundation
  push:
    branches:
      - main
      - preview
      - 310-companion-app-foundation

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Typecheck, test, and verify OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Regenerate inferred API contract types
        run: npm run contracts:generate

      - name: Verify inferred API contract types are committed
        run: git diff --exit-code -- packages/api-contract/src/contracts.ts packages/api-contract/src/zod/openapi-aliases.ts

      - name: Typecheck workspaces
        run: npm run typecheck --workspaces --if-present

      - name: Run test suites
        run: npm test

      - name: Regenerate OpenAPI document
        run: npm run openapi:generate

      - name: Verify generated OpenAPI is committed
        run: git diff --exit-code -- public/openapi.json
