name: Quality

on:
  pull_request:
    branches:
      - main
      - preview
  push:
    branches:
      - main
      - preview

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  impact:
    name: Determine affected apps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web: ${{ steps.impact.outputs.web }}
      mobile: ${{ steps.impact.outputs.mobile }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: impact
        env:
          APP_IMPACT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          APP_IMPACT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/app-impact.mjs --github-output

  test:
    name: Typecheck, test, and verify OpenAPI
    needs: impact
    if: needs.impact.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Regenerate inferred API contract types
        run: npm run contracts:generate

      - name: Verify inferred API contract types are committed
        run: git diff --exit-code -- packages/api-contract/src/contracts.ts packages/api-contract/src/zod/openapi-aliases.ts

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Verify shared package boundaries
        run: npm run check:package-boundaries

      - name: Run test suites
        run: npm test

      - name: Regenerate OpenAPI document
        run: npm run openapi:generate

      - name: Verify generated OpenAPI is committed
        run: git diff --exit-code -- apps/web/public/openapi.json

  mobile:
    name: Typecheck and export mobile
    needs: impact
    if: needs.impact.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck mobile app
        run: npm run mobile:typecheck

      - name: Test mobile runtime configuration
        run: npm test --workspace @meadtools/mobile

      - name: Verify Expo can export an Android bundle
        run: npm exec --workspace @meadtools/mobile -- expo export --platform android
